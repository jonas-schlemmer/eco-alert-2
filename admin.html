<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>EcoAlert - Painel Administrativo</title>
    <link rel="stylesheet" href="admin.css">
    <link rel="shortcut icon" href="logo.avif">
</head>
<body>

    <header class="navbar">
        <div class="nav-logo">
            <h1>EcoAlert</h1>
        </div>
        <nav class="nav-menu">
            <a href="admin.html" class="nav-btn active">GERENCIAR DENÚNCIAS</a>
            <a href="gerenciar-usuarios.html" class="nav-btn">GERENCIAR USUÁRIOS</a>
            <a href="#" class="nav-btn">RELATÓRIOS</a>
        </nav>
        <div class="nav-user">
    <span id="user-name">Carregando...</span>
    <button id="btn-sair" class="logout-btn">SAIR</button>
</div>
    </header>

    <div class="admin-badge-container">
        <div class="admin-badge">ADMINISTRADOR</div>
    </div>

    <main class="dashboard-content">
        
        <section class="status-container">
            <div class="status-card">
                <div class="circle-counter" id="qtd-pendentes">1</div>
                <div class="status-label">PENDENTES</div>
            </div>
            
            <div class="status-card highlight">
                <div class="circle-counter big" id="qtd-resolvidas">3</div>
                <div class="status-label">RESOLVIDAS</div>
            </div>
            
            <div class="status-card">
                <div class="circle-counter" id="qtd-analise">1</div>
                <div class="status-label">EM ANÁLISE</div>
            </div>
        </section>

        <section class="table-container">
            <h2>Últimas denúncias</h2>
            <table class="denuncias-table">
                <thead>
                    <tr>
                        <th>Título</th>
                        <th>Status</th>
                        <th>Localização</th>
                        <th>Data</th>
                    </tr>
                </thead>
                <tbody id="table-body"></tbody>
            </table>
        </section>

    </main>

    <script type="module" src="admin.js"></script>
</body>
</html>
