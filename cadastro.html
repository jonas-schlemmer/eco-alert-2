<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>EcoAlert | Cadastre-se</title>
    <link rel="stylesheet" href="style.css">
    <link rel="shortcut icon" href="logo.avif">
</head>
<body>

    <main class="login-container">
        <div class="login-card">
            
            <div class="card-header">
                <div class="logo-placeholder" id="logo-container">
                    <img src="logo.avif" alt="EcoAlert Logo" class="logo-img">
                </div>
            </div>

            <div class="card-body">
                <form id="cadastro-form">
                    <div class="input-group">
                        <input type="text" id="nome" placeholder="Nome" required>
                    </div>

                    <div class="input-group">
                        <input type="email" id="email" placeholder="E-mail" required>
                    </div>
                    
                    <div class="input-group">
                        <input type="password" id="senha" placeholder="Senha" required minlength="6">
                    </div>

                    <button type="submit" id="btn-cadastrar">Cadastrar</button>
                </form>

                <p class="signup-text">
                    Já possui uma conta? <a href="index.html">Faça login</a>
                </p>
            </div>

        </div>
    </main>

    <script type="module" src="cadastro.js"></script>
</body>
</html>
