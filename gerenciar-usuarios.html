<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>EcoAlert - Gerenciamento de Usuários</title>
    <link rel="stylesheet" href="admin.css">

<body>

    <header class="navbar">

        <div class="nav-user">
