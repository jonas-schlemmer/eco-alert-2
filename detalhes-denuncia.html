<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>EcoAlert - Detalhes da Denúncia</title>
    <link rel="stylesheet" href="detalhes-denuncia.css">
    <link rel="shortcut icon" href="logo.avif">
</head>
<body>

    <header class="navbar">
        <div class="nav-logo">
            <h1>EcoAlert</h1>
        </div>
        <nav class="nav-menu">
            <a href="dashboard.html" class="nav-btn">DASHBOARD</a>
            <a href="nova-denuncia.html" class="nav-btn">NOVA DENÚNCIA</a>
        </nav>
        <div class="nav-user">
            <span id="user-name">Carregando...</span>
            <button id="btn-sair" class="logout-btn">SAIR</button>
        </div>
    </header>

    <main class="detalhes-container">
        <div class="detalhes-card">
            <h2>Detalhes da Ocorrência</h2>
            
            <div class="grid-detalhes-sem-imagem" style="display: flex; gap: 30px;">
                <div style="flex: 1; display: flex; flex-direction: column; gap: 20px;">
                    
                    <div class="info-group">
                        <label for="titulo" style="font-size: 12px; color: #555; font-weight: bold; display: block; margin-bottom: 5px;">Título</label>
                        <input type="text" id="titulo" readonly placeholder="Título da denúncia" style="width: 100%; padding: 10px; border: 1px solid #ccc; border-radius: 4px;">
                    </div>

                    <div class="info-group">
                        <label for="localizacao" style="font-size: 12px; color: #555; font-weight: bold; display: block; margin-bottom: 5px;">Localização</label>
                        <input type="text" id="localizacao" readonly placeholder="Localização" style="width: 100%; padding: 10px; border: 1px solid #ccc; border-radius: 4px;">
                    </div>
                    
                    <div class="info-group">
                        <label for="descricao" style="font-size: 12px; color: #555; font-weight: bold; display: block; margin-bottom: 5px;">Descrição</label>
                        <textarea id="descricao" readonly placeholder="Descrição" rows="4" style="width: 100%; padding: 10px; border: 1px solid #ccc; border-radius: 4px; resize: none;"></textarea>
                    </div>

                    <div class="status-box" style="background: #e9ecef; padding: 15px; border-radius: 8px; border: 1px solid #ccc;">
                        <div class="status-header" style="font-size: 12px; color: #555; font-weight: bold;">Status Atual</div>
                        <div class="status-value" id="denuncia-status" style="font-size: 16px; font-weight: bold; margin-top: 5px;">Pendente</div>
                    </div>

                    <div class="actions-group" style="display: none; gap: 10px;">
                        <button id="btn-editar" class="btn-action" style="padding: 10px 20px; background-color: #007bff; color: white; border: none; border-radius: 4px; cursor: pointer;">EDITAR</button>
                        <button id="btn-excluir" class="btn-action" style="padding: 10px 20px; background-color: #dc3545; color: white; border: none; border-radius: 4px; cursor: pointer;">EXCLUIR</button>
                    </div>
                </div>
            </div>
        </div>
    </main>

    <script type="module" src="detalhes-denuncia.js"></script>
</body>
</html>
